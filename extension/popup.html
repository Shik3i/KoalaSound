<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <span class="header-icon">🎵</span>
      <h1>KoalaSound</h1>
      <span class="header-right">
        <span class="header-version">v0.3</span>
        <a href="https://github.com/Shik3i/KoalaSound" target="_blank" class="header-gh-link" title="GitHub">
          <svg class="header-gh-icon" viewBox="0 0 16 16" width="14" height="14">
            <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
      </span>
    </header>

    <section id="tab-section">
      <div class="section-head">
        <h2>Target Tab</h2>
      </div>
      <div class="tab-select" id="tabSelect">
        <button class="tab-select-trigger" id="tabSelectTrigger">
          <span class="tab-select-icon">🌐</span>
          <span class="tab-select-label">No tab selected</span>
          <span class="tab-select-arrow">▾</span>
        </button>
        <div class="tab-select-dropdown" id="tabSelectDropdown"></div>
      </div>
    </section>

    <section id="tweaks-section">
      <div class="section-head">
        <h2>Audio Tweaks</h2>
      </div>
      <div id="tweaks" class="disabled">

        <div class="tweak-group" data-group="compressor">
          <div class="tweak-group-header">
            <span class="tweak-group-arrow">▶</span>
            <span class="tweak-group-label">Compressor</span>
            <label class="switch">
              <input type="checkbox" class="group-master-toggle">
              <span class="slider"></span>
            </label>
          </div>
          <div class="tweak-group-body">
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="gentle">
              <span class="preset-name">Gentle</span>
              <span class="preset-desc">-20dB · 4:1</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="moderate">
              <span class="preset-name">Moderate</span>
              <span class="preset-desc">-30dB · 8:1</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="movie">
              <span class="preset-name">Movie</span>
              <span class="preset-desc">-35dB · 12:1</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="heavy">
              <span class="preset-name">Heavy</span>
              <span class="preset-desc">-40dB · 20:1</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="custom">
              <span class="preset-name">Custom</span>
              <span class="preset-desc">manual</span>
            </label>
            <div class="custom-controls" id="compressor-custom">
              <div class="param-row">
                <span class="param-label">Threshold</span>
                <input type="range" min="-60" max="0" value="-24" step="1" data-param="threshold">
                <span class="param-value">-24 dB</span>
              </div>
              <div class="param-row">
                <span class="param-label">Knee</span>
                <input type="range" min="0" max="40" value="30" step="1" data-param="knee">
                <span class="param-value">30 dB</span>
              </div>
              <div class="param-row">
                <span class="param-label">Ratio</span>
                <input type="range" min="1" max="20" value="12" step="0.5" data-param="ratio">
                <span class="param-value">12:1</span>
              </div>
              <div class="param-row">
                <span class="param-label">Attack</span>
                <input type="range" min="0" max="1" value="0.003" step="0.001" data-param="attack">
                <span class="param-value">3 ms</span>
              </div>
              <div class="param-row">
                <span class="param-label">Release</span>
                <input type="range" min="0" max="1" value="0.25" step="0.005" data-param="release">
                <span class="param-value">250 ms</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <footer id="status-bar"></footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
