<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <img src="icons/icon-16.png" class="header-icon" alt="" width="16" height="16">
      <h1>KoalaSound</h1>
        <a href="https://github.com/Shik3i/KoalaSound" target="_blank" class="header-right-link" title="KoalaSound on GitHub">
        <span class="header-version"></span>
        <svg class="header-gh-icon" viewBox="0 0 16 16" width="14" height="14">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </header>

    <section id="tab-section">
      <div class="section-head">
        <h2>Target Tab</h2>
      </div>
      <div class="tab-select" id="tabSelect">
        <button class="tab-select-trigger" id="tabSelectTrigger">
          <span class="tab-select-icon">🌐</span>
          <span class="tab-select-label">No tab selected</span>
          <span class="tab-select-arrow">▾</span>
        </button>
        <button class="tab-reload-btn" id="tabReloadBtn" title="Reload tab &amp; re‑inject">🔄</button>
        <div class="tab-select-dropdown" id="tabSelectDropdown"></div>
      </div>
    </section>

    <section id="tweaks-section">
      <div class="section-head">
        <h2>Audio Tweaks</h2>
      </div>
      <div id="tweaks" class="disabled">

        <div class="tweak-group" data-group="compressor">
          <div class="tweak-group-header">
            <span class="tweak-group-arrow">▶</span>
            <span class="tweak-group-label">Compressor</span>
            <label class="switch">
              <input type="checkbox" class="group-master-toggle">
              <span class="slider"></span>
            </label>
          </div>
          <div class="tweak-group-body">
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="gentle">
              <span class="preset-name">Gentle</span>
              <span class="preset-desc">-10dB · 2.5:1</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="moderate">
              <span class="preset-name">Moderate</span>
              <span class="preset-desc">-18dB · 4:1</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="movie">
              <span class="preset-name">Movie</span>
              <span class="preset-desc">-24dB · 8:1</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="heavy">
              <span class="preset-name">Heavy</span>
              <span class="preset-desc">-32dB · 20:1</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="compressor-preset" value="custom">
              <span class="preset-name">Custom</span>
              <span class="preset-desc">manual</span>
            </label>
            <div class="custom-controls" id="compressor-custom">
              <div class="param-row">
                <span class="param-label">Threshold</span>
                <input type="range" min="-60" max="0" value="-24" step="1" data-param="threshold">
                <input type="text" class="param-value" inputmode="numeric" data-param="threshold">
              </div>
              <div class="param-row">
                <span class="param-label">Knee</span>
                <input type="range" min="0" max="40" value="30" step="1" data-param="knee">
                <input type="text" class="param-value" inputmode="numeric" data-param="knee">
              </div>
              <div class="param-row">
                <span class="param-label">Ratio</span>
                <input type="range" min="1" max="20" value="12" step="0.5" data-param="ratio">
                <input type="text" class="param-value" inputmode="decimal" data-param="ratio">
              </div>
              <div class="param-row">
                <span class="param-label">Attack</span>
                <input type="range" min="0" max="1" value="0.003" step="0.001" data-param="attack">
                <input type="text" class="param-value" inputmode="decimal" data-param="attack">
              </div>
              <div class="param-row">
                <span class="param-label">Release</span>
                <input type="range" min="0" max="1" value="0.25" step="0.005" data-param="release">
                <input type="text" class="param-value" inputmode="decimal" data-param="release">
              </div>
            </div>
          </div>
        </div>

        <div class="tweak-group" data-group="equalizer">
          <div class="tweak-group-header">
            <span class="tweak-group-arrow">▶</span>
            <span class="tweak-group-label">Equalizer</span>
            <label class="switch">
              <input type="checkbox" class="group-master-toggle">
              <span class="slider"></span>
            </label>
          </div>
          <div class="tweak-group-body">
            <label class="preset-option">
              <input type="radio" name="equalizer-preset" value="flat">
              <span class="preset-name">Flat</span>
              <span class="preset-desc">0dB all</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="equalizer-preset" value="podcast">
              <span class="preset-name">Podcast</span>
              <span class="preset-desc">+4dB mids</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="equalizer-preset" value="movieBass">
              <span class="preset-name">Movie Bass</span>
              <span class="preset-desc">+5dB lows</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="equalizer-preset" value="bright">
              <span class="preset-name">Bright</span>
              <span class="preset-desc">+5dB highs</span>
            </label>
            <label class="preset-option">
              <input type="radio" name="equalizer-preset" value="custom">
              <span class="preset-name">Custom</span>
              <span class="preset-desc">manual</span>
            </label>
            <div class="custom-controls" id="equalizer-custom">
              <div class="param-row">
                <span class="param-label">Bass</span>
                <input type="range" min="-12" max="12" value="0" step="0.5" data-param="bass">
                <input type="text" class="param-value" inputmode="decimal" data-param="bass">
              </div>
              <div class="param-row">
                <span class="param-label">Low Mid</span>
                <input type="range" min="-12" max="12" value="0" step="0.5" data-param="lowMid">
                <input type="text" class="param-value" inputmode="decimal" data-param="lowMid">
              </div>
              <div class="param-row">
                <span class="param-label">Mid</span>
                <input type="range" min="-12" max="12" value="0" step="0.5" data-param="mid">
                <input type="text" class="param-value" inputmode="decimal" data-param="mid">
              </div>
              <div class="param-row">
                <span class="param-label">High Mid</span>
                <input type="range" min="-12" max="12" value="0" step="0.5" data-param="highMid">
                <input type="text" class="param-value" inputmode="decimal" data-param="highMid">
              </div>
              <div class="param-row">
                <span class="param-label">Air</span>
                <input type="range" min="-12" max="12" value="0" step="0.5" data-param="air">
                <input type="text" class="param-value" inputmode="decimal" data-param="air">
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <footer id="status-bar"></footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
