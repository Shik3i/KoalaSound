name: Release Extension

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag in manifest
        run: |
          TAG="${{ github.ref_name }}"
          V="${TAG#v}"
          if [[ "$V" =~ ^[0-9]+\.[0-9]+$ ]]; then V_FULL="${V}.0"; else V_FULL="$V"; fi
          jq --arg v "$V_FULL" --arg vn "$V" \
            '.version = $v | .version_name = $vn' \
            extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json

      - name: Package extension
        run: |
          cd extension
          VERSION="${{ github.ref_name }}"
          zip -r "../koalasound-${VERSION}.zip" . -x "icons/icon.svg"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: koalasound-*.zip
          generate_release_notes: false
          name: KoalaSound ${{ github.ref_name }}
          body: |
            ## KoalaSound ${{ github.ref_name }}

            ### How to install
            1. Download `koalasound-${{ github.ref_name }}.zip`
            2. Unzip
            3. Open `chrome://extensions`
            4. Enable Developer mode
            5. Load unpacked → select the `extension` folder

            See [README](https://github.com/Shik3i/KoalaSound) for details.
